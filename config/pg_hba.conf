# config/pg_hba.conf
# Matches existing chado.flybase.org behavior: trust auth for the flybase user.
# Acceptable because the flybase role has read-only access via default privileges.

# TYPE  DATABASE        USER            ADDRESS                 METHOD
local   all             all                                     trust
host    all             postgres        127.0.0.1/32            trust
host    all             postgres        ::1/128                 trust
host    all             flybase         0.0.0.0/0               trust
host    all             flybase         ::/0                    trust
