# config/postgresql.conf
# Verbatim of non-default settings from chado_dec_2025 (PostgreSQL 13.22, r6g.xlarge).
# Tuned for ~32 GB RAM dedicated to this database.
# Source of truth: ../reference/chado_dec_2025_inspection.txt

# --- Connections ---
listen_addresses = '*'
max_connections = 20

# --- Memory ---
shared_buffers = 8GB
effective_cache_size = 24GB
work_mem = 100MB
maintenance_work_mem = 2GB
wal_buffers = 16MB

# --- Background writer / WAL ---
max_wal_size = 16GB
min_wal_size = 4GB
checkpoint_completion_target = 0.9

# --- Planner ---
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 500

# --- Parallelism ---
max_worker_processes = 4
max_parallel_workers = 4
max_parallel_workers_per_gather = 2

# --- Vacuum / durability ---
# Static read-only data, rebuilt per release: autovacuum and fsync are disabled
# for load speed. Safe because the database is reload-able from S3.
autovacuum = off
fsync = off

# --- Logging ---
logging_collector = on
log_truncate_on_rotation = on
log_rotation_age = 1440
log_rotation_size = 0
log_timezone = 'UTC'

# --- Locale / formatting ---
DateStyle = 'ISO, MDY'
TimeZone = 'UTC'
lc_messages = 'C'
lc_monetary = 'C'
lc_numeric = 'C'
lc_time = 'C'
default_text_search_config = 'pg_catalog.english'

# --- TCP keepalives (matches live config) ---
tcp_keepalives_idle = 300
tcp_keepalives_interval = 75
tcp_keepalives_count = 9

# NOTE: hba_file is set in Task 3 once pg_hba.conf is created. Without that,
# the postgres server will fail to start because hba_file would point at a
# missing file.
